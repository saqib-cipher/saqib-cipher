<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <style>
      .bg { fill: #FAFAFA; }
      .card-large { fill: #F3F4F6; rx: 24px; }
      .card-medium { fill: #E5E7EB; rx: 16px; }
      .fab { fill: #1F2937; rx: 16px; }
      .pill { fill: #FFFFFF; rx: 16px; stroke: #D1D5DB; stroke-width: 1px; }
      .pill-filled { fill: #4B5563; rx: 16px; }
      .text-title { font-family: 'Segoe UI', Roboto, sans-serif; font-size: 22px; font-weight: 600; fill: #111827; }
      .text-body { font-family: 'Segoe UI', Roboto, sans-serif; font-size: 14px; font-weight: 400; fill: #4B5563; }
      .text-pill { font-family: 'Segoe UI', Roboto, sans-serif; font-size: 14px; font-weight: 500; fill: #1F2937; text-anchor: middle; }
      .text-pill-white { font-family: 'Segoe UI', Roboto, sans-serif; font-size: 14px; font-weight: 500; fill: #FFFFFF; text-anchor: middle; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" rx="32" class="bg" />

  <!-- Title Card -->
  <rect x="40" y="40" width="340" height="150" class="card-large" />
  <text x="70" y="90" class="text-title">Material 3 Expressive UI</text>
  <text x="70" y="120" class="text-body">Embracing soft colors, large rounded</text>
  <text x="70" y="145" class="text-body">corners, and playful components.</text>
  
  <!-- Buttons Card -->
  <rect x="420" y="40" width="340" height="150" class="card-medium" />
  
  <!-- Pills -->
  <rect x="450" y="70" width="80" height="32" class="pill" />
  <text x="490" y="91" class="text-pill">Outline</text>
  
  <rect x="540" y="70" width="80" height="32" class="pill-filled" />
  <text x="580" y="91" class="text-pill-white">Filled</text>

  <rect x="630" y="70" width="100" height="32" class="pill" fill="#E5E7EB" stroke="none" />
  <text x="680" y="91" class="text-pill">Tonal</text>

  <!-- Floating Action Buttons -->
  <rect x="450" y="120" width="56" height="56" class="fab" />
  <path d="M478 141 L478 155 M471 148 L485 148" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>

  <rect x="520" y="120" width="120" height="56" class="fab" />
  <path d="M545 141 L545 155 M538 148 L552 148" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <text x="590" y="153" font-family="sans-serif" font-weight="500" font-size="14" fill="#FFFFFF">Create</text>

  <!-- Bottom Large Area representing an App layout -->
  <rect x="40" y="210" width="720" height="150" class="card-large" />
  
  <!-- Content inside bottom area -->
  <rect x="70" y="240" width="200" height="90" class="card-medium" fill="#FFFFFF" />
  <rect x="90" y="260" width="40" height="40" rx="20" fill="#D1D5DB" />
  <rect x="145" y="265" width="100" height="10" rx="5" fill="#F3F4F6" />
  <rect x="145" y="285" width="60" height="10" rx="5" fill="#F3F4F6" />

  <rect x="290" y="240" width="200" height="90" class="card-medium" fill="#FFFFFF" />
  <rect x="310" y="260" width="40" height="40" rx="20" fill="#D1D5DB" />
  <rect x="365" y="265" width="100" height="10" rx="5" fill="#F3F4F6" />
  <rect x="365" y="285" width="60" height="10" rx="5" fill="#F3F4F6" />

  <rect x="510" y="240" width="220" height="90" class="card-medium" fill="#FFFFFF" />
  <rect x="530" y="260" width="40" height="40" rx="20" fill="#D1D5DB" />
  <rect x="585" y="265" width="100" height="10" rx="5" fill="#F3F4F6" />
  <rect x="585" y="285" width="60" height="10" rx="5" fill="#F3F4F6" />

</svg>
